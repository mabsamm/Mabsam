<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilustration | Mabsam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>

        html, body {
            overflow-y: visible !important; 
            overflow-x: hidden !important;
            height: auto !important; 
            min-height: 100% !important;
            background-color: #000;
        }


        .gallery-container {
            display: block !important;
            height: auto !important;
            min-height: 100vh;
            padding-bottom: 150px; 
            position: relative;
            z-index: 10;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            transition: all 0.5s ease;
        }


        .image-grid:hover .art-card {
            opacity: 0.2;
            filter: grayscale(100%) blur(3px);
            transform: scale(0.95);
        }

        .art-card {
            background: #0a0a0a;
            border: 2px solid #222;
            overflow: hidden;
            aspect-ratio: 1 / 1; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .art-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.4s ease;
        }

  
        .image-grid .art-card:hover {
            opacity: 1 !important;
            filter: grayscale(0%) blur(0px) !important;
            transform: scale(1.15); 
            z-index: 100;
            border-color: #00f3ff;
            box-shadow: 0 0 30px #00f3ff;
        }


        .art-card:hover img {
            object-fit: contain; 
        }


        .tags-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .pixel-tag {
            font-family: 'VT323', monospace;
            padding: 4px 12px;
            border: 2px solid;
            text-transform: uppercase;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        
        .pixel-tag:hover { background: white; color: black; transform: translateY(-3px); }
        .cyan { color: #00f3ff; border-color: #00f3ff; box-shadow: 0 0 5px #00f3ff; }
        .magenta { color: #ff00ff; border-color: #ff00ff; box-shadow: 0 0 5px #ff00ff; }
        .lime { color: #ccff00; border-color: #ccff00; box-shadow: 0 0 5px #ccff00; }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

        <div id="header-placeholder"></div>
        <script>
             fetch('header.html')
            .then(r => r.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            });
        </script>

    <main class="gallery-container">
        
        <div class="tags-wrapper">
            <span class="pixel-tag cyan">vtuber</span>
            <span class="pixel-tag magenta">furry</span>
            <span class="pixel-tag cyan">vtuber assets</span>
            <span class="pixel-tag lime">concept art</span>
            <span class="pixel-tag magenta">emotes</span>
            <span class="pixel-tag lime">chibi</span>
            <span class="pixel-tag cyan">logos</span>
            <span class="pixel-tag magenta">monster</span>
            <span class="pixel-tag lime">kemonomimi</span>
            <span class="pixel-tag cyan">sketches</span>
        </div>

        <div class="image-grid">
            <div class="art-card"><img src="ILUSTRACIONES/MIKU.webp" alt="Miku"></div>
            <div class="art-card"><img src="ILUSTRACIONES/GUMI.webp" alt="Gumi"></div>
            <div class="art-card"><img src="ILUSTRACIONES/TETO.webp" alt="Teto"></div>
            <div class="art-card"><img src="ILUSTRACIONES/GIRL.webp" alt="Girl"></div>
            <div class="art-card"><img src="ILUSTRACIONES/GUARU.webp" alt="Guaru"></div>
            <div class="art-card"><img src="ILUSTRACIONES/MIA.webp" alt="Mia"></div>
            <div class="art-card"><img src="ILUSTRACIONES/MLP.webp" alt="MLP"></div>
            <div class="art-card"><img src="ILUSTRACIONES/MLP2.webp" alt="MLP2"></div>
            <div class="art-card"><img src="ILUSTRACIONES/ML3.webp" alt="MLP3"></div>
            <div class="art-card"><img src="ILUSTRACIONES/PRISM.webp" alt="Prism"></div>
            <div class="art-card"><img src="ILUSTRACIONES/ROBERT.webp" alt="Robert"></div>
            <div class="art-card"><img src="ILUSTRACIONES/ZAHIR.webp" alt="Zahir"></div>
            <div class="art-card"><img src="ILUSTRACIONES/EXPRESIONES.webp" alt="Expresiones"></div>
            <div class="art-card"><img src="ILUSTRACIONES/ATOM.webp" alt="Atom"></div>
            <div class="art-card"><img src="ILUSTRACIONES/ASFIXIA.webp" alt="Asfxia"></div>
            <div class="art-card"><img src="ILUSTRACIONES/BULDAK.webp" alt="Buldak"></div>
        </div>

    </main>

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const symbols = ['✧', '✦', '♡', 'ミ★'];
        const colors = ['#00f3ff', '#ff00ff', '#ccff00'];

        class Particle {
            constructor() { this.init(); }
            init() {
                const isLeft = Math.random() > 0.5;
                this.x = isLeft ? Math.random() * (canvas.width * 0.10) : canvas.width - (Math.random() * (canvas.width * 0.10));
                this.y = Math.random() * canvas.height;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.size = Math.random() * 15 + 8;
                this.symbol = symbols[Math.floor(Math.random() * symbols.length)];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.y += this.speedY;
                if (this.y > canvas.height) this.y = -20;
            }
            draw() {
                ctx.fillStyle = this.color; ctx.font = `${this.size}px Arial`;
                ctx.shadowBlur = 8; ctx.shadowColor = this.color;
                ctx.fillText(this.symbol, this.x, this.y); ctx.shadowBlur = 0;
            }
        }
        for (let i = 0; i < 40; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) { p.update(); p.draw(); }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
