    <script>
        const videos = document.querySelectorAll('.anim-card video');
        videos.forEach(v => {
            const container = v.parentElement;
            
            container.addEventListener('mouseenter', () => {
                v.muted = false; 
                v.volume = 0.5; 
                v.play().catch(e => console.log("Interacción requerida para audio"));
            });
            
            container.addEventListener('mouseleave', () => {
                v.pause();
                v.currentTime = 0;
                v.muted = true;
            });
        });

        // Partículas laterales
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const symbols = ['✧', '✦', '♡', 'ミ★'];
        class Particle {
            constructor() { this.init(); }
            init() {
                const isLeft = Math.random() > 0.5;
                this.x = isLeft ? Math.random() * (canvas.width * 0.12) : canvas.width - (Math.random() * (canvas.width * 0.12));
                this.y = -Math.random() * canvas.height;
                this.speedY = Math.random() * 2 + 1;
                this.size = Math.random() * 15 + 10;
                this.symbol = symbols[Math.floor(Math.random() * symbols.length)];
                this.color = Math.random() > 0.5 ? '#ff00ff' : '#00f3ff';
            }
            update() { this.y += this.speedY; if (this.y > canvas.height) this.init(); }
            draw() {
                ctx.fillStyle = this.color; ctx.font = `${this.size}px Arial`;
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.fillText(this.symbol, this.x, this.y); ctx.shadowBlur = 0;
            }
        }
        for (let i = 0; i < 35; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) { p.update(); p.draw(); }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
