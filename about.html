<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Mabsam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #000; 
            pointer-events: none;
        }


        body, main, .about-container, .content-wrapper {
            background-color: transparent !important;
        }

        .about-container {
            position: relative;
            z-index: 1; 
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

        <div id="header-placeholder"></div>
        <script>
             fetch('header.html')
            .then(r => r.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            });
        </script>

    <main class="about-container">
        <section class="content-wrapper">
            
            <div class="text-side">
                <p class="pixel-text">
                    ¡Hola! Soy Mabsam, ── .✦. 
                    Soy una ilustradora, animadora y diseñadora boliviana. 
                    Desde que conseguí mi primera tableta gráfica, he trabajado 
                    como freelancer, dando vida a las ideas a través de imágenes 
                    y movimiento. 
                    Orgullosa nerd de internet.
                    . ݁₊ ⊹ . ݁ ⟡ ݁ .
                </p>

                <div class="social-links">
                    <a href="https://www.instagram.com/mabsam_/" class="social-icon icon-insta" target="_blank">Instagram</a>
                    <a href="https://mabsam.carrd.co/" class="social-icon icon-carrd" target="_blank">Carrd</a>
                    <a href="https://vgen.co/mabsam" class="social-icon icon-vgen" target="_blank">VGen</a>
                </div>
            </div>

            <div class="avatar-side">
                <img src="avatar.png" alt="Mabsam Avatar" class="floating-avatar">
            </div>

        </section>
    </main>

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        // kaomojis 
        const symbols = ['(๑•ᴗ•๑)', 'ʕ⸝⸝⸝˙Ⱉ˙ʔ', '♡'];
        const neonColors = ['#00f3ff', '#ff00ff'];

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = (Math.random() - 0.5) * 1.5;
                this.size = Math.random() * 20 + 15;
                this.symbol = symbols[Math.floor(Math.random() * symbols.length)];
                this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
            }
            update() {
                this.x += this.speedX; 
                this.y += this.speedY;
                

                if (this.x > canvas.width) this.x = 0; 
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; 
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color; 
                
                ctx.font = `bold ${this.size}px Arial`;
                ctx.shadowBlur = 12; 
                ctx.shadowColor = this.color;
                ctx.fillText(this.symbol, this.x, this.y); 
                ctx.shadowBlur = 0;
            }
        }


        for (let i = 0; i < 35; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) { 
                p.update(); 
                p.draw(); 
            }
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
